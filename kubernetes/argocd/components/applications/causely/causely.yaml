apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: causely
  namespace: argocd
spec:
  project: causely
  destination:
    namespace: causely
    server: https://kubernetes.default.svc
  source:
    repoURL: us-docker.pkg.dev/public-causely/public
    chart: causely
    targetRevision: v1.0.129-0-g7ef05a41ae8c7e2d
    helm:
      releaseName: causely
      parameters:
        - name: image.tag
          value: latest
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - .spec.template.spec.containers[].image
    - group: apps
      kind: DaemonSet
      jqPathExpressions:
        - .spec.template.spec.containers[].image
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
